# Curriculum ladder: NN graduates through increasingly strong opponents
# Random -> Greedy -> OnePly -> Eisenstein
# Promotes when win rate > 60% over 20 curriculum games
# Larger network + more sims than bootstrap for real learning

game:
  win_length: 6
  first_turn_stones: 1
  normal_turn_stones: 2

network:
  grid_size: 13
  num_blocks: 3                # small and fast — speed > capacity at this stage
  channels: 48
  in_channels: 12

mcts:
  num_simulations: 25          # fast iterations, learn from volume not depth
  cpuct: 2.5
  dirichlet_alpha: 0.15
  dirichlet_epsilon: 0.25
  temperature_moves: 6
  temperature_final: 0.05
  temperature_schedule: cosine
  fpu_reduction: 0.0
  zoi_margin: 2
  virtual_loss: 3
  num_threads: 1
  batch_size: 8
  max_moves: 60                # more room to find wins

bootstrap:
  num_games: 3000
  epochs: 40
  batch_size: 128
  learning_rate: 0.003

training:
  num_iterations: 500
  games_per_iteration: 30
  training_steps_per_iteration: 80
  batch_size: 64
  learning_rate: 0.005
  lr_schedule: cosine
  lr_min: 0.0001
  weight_decay: 0.0001
  momentum: 0.9
  optimizer: sgd
  replay_buffer_size: 5000
  augment_d6: true
  max_grad_norm: 1.0
  value_weight: 1.0
  policy_weight: 1.0
  ownership_weight: 0.05
  threat_weight: 0.05
  td_gamma: 0.99

  # Curriculum ladder (starts at Random, promotes through tiers)
  curriculum_agent: ladder
  curriculum_ratio: 0.7        # 70% curriculum games — maximize decisive outcomes
  curriculum_ramp_down: 250    # start reducing curriculum near the end
  curriculum_promote_threshold: 0.6   # promote when 60% win rate
  curriculum_promote_window: 20       # over at least 20 curriculum games

evaluation:
  games: 20
  win_threshold: 0.55
  checkpoint_interval: 10

playout_cap:
  enabled: false
